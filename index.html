<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Before & After Preview</title>

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>"
    />

    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="content-container">
      <div class="content">
        <div class="toolbar">
          <span class="toolbar-title">Before & After</span>

          <div class="toolbar-controls">
            <select onchange="setColors(this)">
              <option selected value="#f0f0f0">Grey</option>
              <option value="#7f7f7f;white">Grey 50%</option>
              <option value="#ffffff">White</option>
              <option value="oklch(26.8% 0.007 34.298);oklch(98.5% 0 0)">Stone</option>
              <option value="#000000;oklch(98.5% 0 0)">Black</option>
              <option value="oklch(98% 0.016 73.684)">Orange</option>
              <option value="oklch(97.7% 0.017 320.058)">Fuchsia</option>
              <option value="oklch(94.1% 0.03 12.58)">Rose</option>
              <option value="oklch(95.3% 0.051 180.801)">Teal</option>
              <option value="oklch(98.6% 0.031 120.757)">Green</option>
              <option value="oklch(39.3% 0.095 152.535);oklch(98.5% 0 0)">Dark green</option>
              <option value="oklch(25.8% 0.092 26.042);oklch(98.5% 0 0)">Red</option>
              <option value="oklch(25.7% 0.09 281.288);oklch(98.5% 0 0)">Indigo</option>
            </select>

            <label class="toolbar-label">
              Cols
              <input type="number" id="grid-cols" value="3" min="1"  onchange="updateGrid()" />
            </label>
            <label class="toolbar-label">
              Rows
              <input type="number" id="grid-rows" value="1" min="1"  onchange="updateGrid()" />
            </label>

            <div class="toolbar-divider"></div>

            <input type="color" id="draw-color" value="#ff0000" title="Draw color" />
            <button class="preset-color-btn" data-color="#ff0000" style="width:22px;height:22px;min-width:22px;padding:0;background-color:#ff0000;border-radius:50%;border:2px solid #333" title="Red"></button>
            <button class="preset-color-btn" data-color="#0066ff" style="width:22px;height:22px;min-width:22px;padding:0;background-color:#0066ff;border-radius:50%;border:2px solid transparent" title="Blue"></button>
            <button class="preset-color-btn" data-color="#00b341" style="width:22px;height:22px;min-width:22px;padding:0;background-color:#00b341;border-radius:50%;border:2px solid transparent" title="Green"></button>
            <input type="range" id="draw-width" min="1" max="12" value="2" title="Line width" style="width:50px;height:28px" />
            <button id="pen-mode-btn" class="tool-mode-btn" title="Pen tool (freehand drawing)">✎</button>
            <button id="arrow-mode-btn" class="tool-mode-btn" title="Arrow tool">↗</button>
            <button id="text-mode-btn" class="tool-mode-btn" title="Text tool (click to place text)">T</button>
            <input type="number" id="draw-font-size" min="8" max="72" value="13" title="Text size" style="width:42px;height:28px;font-size:10pt;border-radius:6px;border:1px solid oklch(92.8% 0.006 264.531);text-align:center;display:none" />

            <div class="toolbar-divider"></div>

            <button onclick="copyAsImage(false)">Copy</button>
            <button onclick="copyAsImage(true, 0.1)">10%</button>
            <button onclick="copyAsImage(true, 0.2)">20%</button>
            <button onclick="copyAsImage(true, 0.3)">30%</button>
            <button onclick="copyAsImage(true, 0.4)">40%</button>
            <button onclick="copyAsImage(true, 0.5)">50%</button>
            <button onclick="copyAsImage(true, 0.8)">80%</button>
            <button onclick="copyAsImage(true, 1)">100%</button>
          </div>
        </div>

        <div id="cards">
          <textarea
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            autocapitalize="off"
            rows="2"
            style="margin-bottom: 16px"
          ></textarea>
          <div class="grid" id="grid"></div>
        </div>
      </div>
    </div>

    <div class="bottom-toolbar" id="bottom-toolbar">
      <div class="bottom-toolbar-resize-handle" id="bottom-toolbar-resize-handle"></div>
      <div class="bottom-toolbar-inner" id="bottom-toolbar-inner">
        <div class="bottom-toolbar-drop" id="bottom-toolbar-drop">
          <span>Drop or paste images here to stage them</span>
        </div>
      </div>
    </div>

    <script src="dom-to-image.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>

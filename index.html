<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Before & After Preview</title>

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>"
    />

    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="toolbar">
          <div class="toolbar-row toolbar-row-1">
            <span class="toolbar-title">Before & After</span>

            <div class="toolbar-controls">
              <label class="toolbar-label">
                Zoom
                <input type="range" id="grid-zoom" min="20" max="300" value="100" step="10" style="width:100px;height:28px" />
                <span id="grid-zoom-label" style="min-width:28px;text-align:center;font-variant-numeric:tabular-nums">100%</span>
              </label>

              <div class="toolbar-divider"></div>

              <div class="grid-size-control">
                <input type="number" id="grid-cols" value="3" min="1" />
                <span class="grid-size-x">×</span>
                <input type="number" id="grid-rows" value="1" min="1" />
              </div>

              <div class="toolbar-divider"></div>

              <button id="relayout-btn" class="tool-mode-btn" title="Compact grid layout — remove blank gaps between images">⇶</button>
              <button id="filename-toggle-btn" class="tool-mode-btn" title="Toggle filenames (f)">Aa</button>
              <button id="staging-toggle-btn" class="tool-mode-btn" title="Toggle staging area (h)" style="transform: rotate(180deg)">⬒</button>
            </div>

            <div class="toolbar-copy">
              <select id="bg-color-select">
                <option disabled selected value="#f0f0f0">Background color</option>
                <option value="#f0f0f0">Grey</option>
                <option value="#7f7f7f;white">Grey 50%</option>
                <option value="#ffffff">White</option>
                <option value="oklch(26.8% 0.007 34.298);oklch(98.5% 0 0)">Stone</option>
                <option value="#000000;oklch(98.5% 0 0)">Black</option>
                <option value="oklch(98% 0.016 73.684)">Orange</option>
                <option value="oklch(97.7% 0.017 320.058)">Fuchsia</option>
                <option value="oklch(94.1% 0.03 12.58)">Rose</option>
                <option value="oklch(95.3% 0.051 180.801)">Teal</option>
                <option value="oklch(98.6% 0.031 120.757)">Green</option>
                <option value="oklch(39.3% 0.095 152.535);oklch(98.5% 0 0)">Dark green</option>
                <option value="oklch(25.8% 0.092 26.042);oklch(98.5% 0 0)">Red</option>
                <option value="oklch(25.7% 0.09 281.288);oklch(98.5% 0 0)">Indigo</option>
              </select>

              <div class="toolbar-divider"></div>

              <select id="copy-scale">
                <optgroup label="Image size">
                  <option value="1">100%</option>
                  <option value="0.8">80%</option>
                  <option value="0.5">50%</option>
                  <option value="0.4" selected>40%</option>
                  <option value="0.3">30%</option>
                  <option value="0.2">20%</option>
                  <option value="0.1">10%</option>
                </optgroup>
                <optgroup label="Output scale">
                  <option value="output-1">100%</option>
                  <option value="output-0.75">75%</option>
                  <option value="output-0.5">50%</option>
                  <option value="output-0.25">25%</option>
                </optgroup>
              </select>
              <button id="copy-btn" title="Copy grid to clipboard (copies selection if active)">Copy</button>
              <button id="download-btn" title="Download as PNG">Download</button>
              <button id="bulk-download-btn" title="Download all staged images individually">Bulk Download</button>
            </div>
          </div>

          <div class="toolbar-drawing-controls">
            <input type="color" id="draw-color" value="#ff0000" title="Draw color" />
            <button class="preset-color-btn" data-color="#ff0000" style="width:20px;height:20px;min-width:20px;padding:0;background-color:#ff0000;border-radius:50%;border:2px solid #3333333a" title="Red"></button>
            <button class="preset-color-btn" data-color="#0066ff" style="width:20px;height:20px;min-width:20px;padding:0;background-color:#0066ff;border-radius:50%;border:2px solid #3333333a" title="Blue"></button>
            <button class="preset-color-btn" data-color="#00b341" style="width:20px;height:20px;min-width:20px;padding:0;background-color:#00b341;border-radius:50%;border:2px solid #3333333a" title="Green"></button>
            <button class="preset-color-btn" data-color="#000000" style="width:20px;height:20px;min-width:20px;padding:0;background-color:#000000;border-radius:50%;border:2px solid #3333333a" title="Black"></button>
            <button class="preset-color-btn" data-color="#353535" style="width:20px;height:20px;min-width:20px;padding:0;background-color:#353535;border-radius:50%;border:2px solid #3333333a" title="Dark grey"></button>
            <button class="preset-color-btn" data-color="#dfdfdf" style="width:20px;height:20px;min-width:20px;padding:0;background-color:#dfdfdf;border-radius:50%;border:2px solid #3333333a" title="Light grey"></button>
            <button class="preset-color-btn" data-color="#ffffff" style="width:20px;height:20px;min-width:20px;padding:0;background-color:#ffffff;border-radius:50%;border:2px solid #33333369" title="White"></button>

            <div class="toolbar-divider"></div>

            <div class="thickness-presets">
              <button class="thickness-btn active" data-width="2" title="Thin">
                <svg width="16" height="16"><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              </button>
              <button class="thickness-btn" data-width="4" title="Medium">
                <svg width="16" height="16"><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
              </button>
              <button class="thickness-btn" data-width="8" title="Thick">
                <svg width="16" height="16"><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/></svg>
              </button>
            </div>

            <div class="toolbar-divider"></div>

            <button id="pen-mode-btn" class="tool-mode-btn" title="Pen tool (b)">✎</button>
            <button id="arrow-mode-btn" class="tool-mode-btn" title="Arrow tool (a)">↗</button>
            <button id="line-mode-btn" class="tool-mode-btn" title="Line tool (l)">╱</button>
            <button id="rect-mode-btn" class="tool-mode-btn" title="Solid rectangle (r)">■</button>
            <button id="rectstroke-mode-btn" class="tool-mode-btn" title="Bordered rectangle (shift+r)">□</button>
            <button id="oval-mode-btn" class="tool-mode-btn" title="Oval tool (o)">○</button>
            <button id="ovalfill-mode-btn" class="tool-mode-btn" title="Solid oval (shift+o)">●</button>
            <button id="dot-mode-btn" class="tool-mode-btn" title="Dot tool (d)">•</button>
            <button id="eraser-mode-btn" class="tool-mode-btn" title="Eraser tool (e)">⌫</button>
            <button id="object-eraser-mode-btn" class="tool-mode-btn" title="Object eraser - removes whole shapes (shift+e)">⌦</button>
            <button id="move-mode-btn" class="tool-mode-btn" title="Move tool - drag drawings to reposition (m)">✥</button>

            <div class="toolbar-divider"></div>
            <button id="text-mode-btn" class="tool-mode-btn" title="Text tool (t)">T</button>
            <input type="number" id="draw-font-size" min="8" max="72" value="13" title="Text size" style="width:42px;height:28px;font-size:10pt;border-radius:6px;border:1px solid oklch(92.8% 0.006 264.531);text-align:center;" />
          </div>
    </div>

    <div class="content-container">
      <div class="content">
        <div id="cards">
          <textarea
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            autocapitalize="off"
            rows="2"
            style="margin-bottom: 16px"
          ></textarea>
          <div class="grid-wrapper">
            <div class="grid" id="grid"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-toolbar" id="bottom-toolbar">
      <div class="bottom-toolbar-resize-handle" id="bottom-toolbar-resize-handle"></div>
      <div class="bottom-toolbar-inner" id="bottom-toolbar-inner">
        <div class="bottom-toolbar-drop" id="bottom-toolbar-drop">
          <span>Drop or paste images here to stage them</span>
        </div>
        <button id="insert-all-btn" class="insert-all-btn" title="Insert all staged images into the grid">Insert All</button>
      </div>
    </div>

    <script src="dom-to-image.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
